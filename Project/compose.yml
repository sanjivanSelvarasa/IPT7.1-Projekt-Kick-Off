services:
  auth-backend:
    build:
      context: ./Backend
    container_name: createyourself-auth-backend
    command: ["node", "authServer.js"]
    env_file:
      - ./Backend/.env
    ports:
      - "4000:4000"
    restart: unless-stopped

  posts-backend:
    build:
      context: ./Backend
    container_name: createyourself-posts-backend
    init: true
    command: ["node", "server.js"]
    env_file:
      - ./Backend/.env
    ports:
      - "3000:3000"
    restart: unless-stopped