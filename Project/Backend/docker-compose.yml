version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: website-backend
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - NODE_ENV=development
    volumes:
      - ./database:/app/database
      - ./routes:/app/routes
      - ./middleware:/app/middleware
      - backend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  backend_node_modules:
